# Font: Noto Sans
name: Parking Bot Alert

on:
  schedule:
    - cron: '*/30 * * * *' # 30분마다 실행
  workflow_dispatch: # 수동 실행 버튼

jobs:
  check_parking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Requests
        run: pip install requests

      - name: Run Parking Monitor
        env:
          PARKING_BOT_TOKEN: ${{ secrets.PARKING_BOT_TOKEN }}
          PARKING_CHAT_ID: ${{ secrets.PARKING_CHAT_ID }}
        run: python parking_monitor.py
