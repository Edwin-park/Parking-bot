# Font: Noto Sans
name: Parking Bot Alert

on:
  schedule:
  #  - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check_parking:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Requests
        run: pip install requests

      - name: Run Parking Monitor
        env:
          PARKING_BOT_TOKEN: ${{ secrets.PARKING_BOT_TOKEN }}
          PARKING_CHAT_ID: ${{ secrets.PARKING_CHAT_ID }}
          # 새로 추가된 개인정보 시크릿들
          PARKING_NAME: ${{ secrets.PARKING_NAME }}
          PARKING_PHONE: ${{ secrets.PARKING_PHONE }}
          PARKING_CAR_NUMBER: ${{ secrets.PARKING_CAR_NUMBER }}
        run: python parking_monitor.py
