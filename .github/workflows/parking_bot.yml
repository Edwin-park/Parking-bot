# Font: Noto Sans
name: Parking Bot Alert

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check_parking:
    runs-on: ubuntu-latest
    # 서버 환경 변수에 타임존 설정 추가
    env:
      TZ: Asia/Seoul
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Requests
        run: pip install requests

      - name: Run Parking Monitor
        env:
          PARKING_BOT_TOKEN: ${{ secrets.PARKING_BOT_TOKEN }}
          PARKING_CHAT_ID: ${{ secrets.PARKING_CHAT_ID }}
        run: python parking_monitor.py
